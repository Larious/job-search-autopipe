version: "3.8"

# ============================================================
# Job Search AutoPipe — Docker Compose
# ============================================================
# Spins up the full local infrastructure:
#   - PostgreSQL 15 (pipeline database)
#   - Apache Airflow 2.x (webserver + scheduler)
#   - Redis (Airflow backend)
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f airflow-webserver
#
# Airflow UI: http://localhost:8080 (admin/admin)
# PostgreSQL: localhost:5432 (autopipe/autopipe_password)
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__RBAC: "true"
    # Pipeline config
    AUTOPIPE_CONFIG: /opt/autopipe/config/config.yaml
    PYTHONPATH: /opt/autopipe
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/autopipe/src
    - ./config:/opt/autopipe/config
    - ./dbt:/opt/autopipe/dbt
    - ./logs:/opt/airflow/logs
  depends_on:
    airflow-db:
      condition: service_healthy
    pipeline-db:
      condition: service_healthy

services:
  # ── Pipeline Database (PostgreSQL) ──────────────────────
  pipeline-db:
    image: postgres:15-alpine
    container_name: autopipe-db
    environment:
      POSTGRES_DB: job_search_autopipe
      POSTGRES_USER: autopipe
      POSTGRES_PASSWORD: autopipe_password
    ports:
      - "5432:5432"
    volumes:
      - pipeline_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopipe -d job_search_autopipe"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ── Airflow Database (PostgreSQL) ───────────────────────
  airflow-db:
    image: postgres:15-alpine
    container_name: airflow-db
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ── Airflow Init (one-time setup) ──────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
        # Install pipeline dependencies
        pip install pyyaml psycopg2-binary requests --quiet
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: >
      bash -c "pip install pyyaml psycopg2-binary requests --quiet &&
               airflow webserver"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Airflow Scheduler ─────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: >
      bash -c "pip install pyyaml psycopg2-binary requests --quiet &&
               airflow scheduler"
    restart: unless-stopped

  # ── Schema Initializer ────────────────────────────────
  # Runs once to create the medallion architecture tables
  schema-init:
    image: python:3.11-slim
    container_name: schema-init
    command: >
      bash -c "pip install psycopg2-binary pyyaml --quiet &&
               python -c \"
import sys; sys.path.insert(0, '/opt/autopipe')
from src.utils.database import Database
db = Database({
    'host': 'pipeline-db',
    'port': 5432,
    'name': 'job_search_autopipe',
    'user': 'autopipe',
    'password': 'autopipe_password',
})
db.initialize_schema()
print('Schema initialized successfully!')
\""
    volumes:
      - ./src:/opt/autopipe/src
    depends_on:
      pipeline-db:
        condition: service_healthy
    restart: "no"

  # ── Telegram Webhook Server ─────────────────────────
  # Receives commands from Telegram and triggers pipeline actions.
  # Expose via ngrok (dev) or reverse proxy (prod).
  telegram-webhook:
    image: python:3.11-slim
    container_name: autopipe-telegram-webhook
    command: >
      bash -c "pip install psycopg2-binary pyyaml --quiet &&
               python -m src.webhook.telegram_webhook_server"
    environment:
      AUTOPIPE_CONFIG: /opt/autopipe/config/config.yaml
      PYTHONPATH: /opt/autopipe
    ports:
      - "8443:8443"
    volumes:
      - ./src:/opt/autopipe/src
      - ./config:/opt/autopipe/config
    depends_on:
      pipeline-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pipeline_data:
  airflow_data:
