summaries:
  pipeline:
    text: I build data pipelines that actually work in production. Over the past year
      I have shipped end-to-end ETL and ELT systems on Airflow, PostgreSQL, Snowflake
      and Docker that handle everything from raw API ingestion through to validated,
      business-ready output. I care about data quality at every stage and I have implemented
      Great Expectations validation and SHA-256 change detection in live pipelines.
      My recent work at 10Alytics involved processing 9,600 energy meter records daily
      at a 98.25% quality rate and building a 5-stage Airflow pipeline ingesting 797
      job listings a day from two APIs with zero manual intervention.
    tags:
    - airflow
    - python
    - etl
    - postgresql
    - docker
    - medallion
  analytics:
    text: I work at the intersection of data modelling and pipeline engineering. I
      have built Medallion Architecture models in dbt Core on Snowflake from scratch,
      migrated an existing dbt project from PostgreSQL to Snowflake without data loss,
      and written schema tests that run in CI with a 100% pass rate in production.
      I think good analytics engineering means the data is trustworthy before it reaches
      any dashboard, so I build quality checks and data contracts into the model layer
      rather than leaving them as an afterthought.
    tags:
    - dbt
    - snowflake
    - analytics
    - sql
    - medallion
    - data-modelling
  cloud:
    text: I design data systems with cloud deployment in mind from day one. My current
      pipelines run fully containerised on Docker Compose with Terraform configuration
      ready for AWS EC2 and ECS deployment via MWAA. I hold an active Azure Administrator
      Associate certification and have hands-on experience with cloud identity, governance
      and infrastructure provisioning. I am comfortable moving a locally built Airflow
      pipeline into a production cloud environment and keeping it there reliably.
    tags:
    - aws
    - azure
    - docker
    - terraform
    - cloud
    - airflow
    - ec2
  platform:
    text: I build and run the full data infrastructure stack, not just individual
      scripts. That means Airflow orchestration, PostgreSQL and Snowflake storage
      layers, Docker containerisation, REST API clients with proper error handling
      and retry logic, and automated quality gates that fire before bad data reaches
      downstream consumers. Both of my current production projects run unattended
      daily with Telegram alerts when something needs attention. I treat operability
      as a first-class requirement, not a nice-to-have.
    tags:
    - airflow
    - postgresql
    - snowflake
    - docker
    - platform
    - orchestration
