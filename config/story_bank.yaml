- id: autopipe-001
  text: Built a 5-stage Airflow pipeline that pulls 797 UK job listings every day
    from the Adzuna and Reed APIs, scores them with an NLP classifier, and sends a
    ranked Telegram digest automatically. The whole thing runs on PostgreSQL with
    a medallion architecture inside Docker Compose with no manual trigger needed.
  tags:
  - airflow
  - python
