      architecture, SHA-256 change detection, Business Health Score quality
      gate, and closed business detector.
    technologies:
      - "Google Places API"
      - "Playwright"
      - "PostgreSQL"
      - "dbt Core"
      - "Great Expectations"
      - "Apache Airflow"
      - "Docker"
      - "Slack Webhooks"
      - "WordPress REST API"

  - name: "Job Search AutoPipe"
    description: >
      Automated job discovery pipeline that ingests from multiple job APIs,
      applies NLP-based role classification and skills matching, delivers
      daily ranked digests, and generates tailored cover letters.
    technologies:
      - "Adzuna API"
      - "Reed API"
      - "PostgreSQL"
      - "dbt Core"
      - "Great Expectations"
      - "Apache Airflow"
      - "Docker"
      - "Slack Webhooks"
      - "Claude API"

